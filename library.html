  --teal:     #38b8b8;
  --text:     #dfd5c2;
  --text-dim: #887d6c;
  --rule:     rgba(200,171,106,.15);

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {

  color: var(--text);

/* ── HEADER ─────────────────────────── */
.site-header {

  position: sticky; top: 0;
}

.header-brand {

  align-items: center;
  gap: 16px;
}

.header-jp {
  font-family: "Noto Serif JP", serif;
  font-weight: 700;
  font-size: 22px;
  background: linear-gradient(135deg, #f0dfa8, #c8ab6a, #8a6535);

  background-clip: text;
  color: transparent;
  filter: drop-shadow(0 0 20px rgba(200,171,106,.3));
}

.header-en {
  font-family: "Cinzel", serif;
  font-size: 10px;
  letter-spacing: .4em;
  color: var(--gold-dim);
  opacity: .7;
}

.header-label {
  font-family: "Cinzel", serif;
  font-size: 9px;
  letter-spacing: .5em;
  color: var(--teal);
  opacity: .6;
  text-transform: uppercase;
}

/* ── SEARCH + FILTER BAR ─────────────── */
.controls {
  position: relative; z-index: 10;
  padding: 28px 40px 20px;
  display: flex;
  gap: 16px;
  align-items: center;
  flex-wrap: wrap;
}

.search-wrap {
  position: relative;
  flex: 1;
  min-width: 200px;
  max-width: 400px;
}

.search-wrap input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--rule);
  color: var(--text);
  font-family: "EB Garamond", serif;
  font-size: 15px;
  padding: 10px 16px 10px 40px;
  outline: none;
  transition: border-color .2s;
}

.search-wrap input:focus {
  border-color: var(--gold-dim);
}

.search-wrap::before {
  content: "⌕";
  position: absolute;
  left: 14px; top: 50%;
  transform: translateY(-50%);
  color: var(--gold-dim);
  font-size: 18px;
  pointer-events: none;
}

.search-wrap input::placeholder { color: var(--text-dim); }

.filter-pills {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.pill {
  font-family: "Cinzel", serif;
  font-size: 9px;
  letter-spacing: .35em;
  padding: 7px 16px;
  border: 1px solid var(--rule);
  color: var(--text-dim);
  cursor: pointer;
  background: transparent;
  transition: all .2s;
  text-transform: uppercase;
}

.pill:hover { border-color: var(--gold-dim); color: var(--gold); }
.pill.active { border-color: var(--gold); color: var(--gold); background: rgba(200,171,106,.06); }

/* ── SECTION TITLES ─────────────────── */
.section-title {
  position: relative; z-index: 10;
  padding: 32px 40px 16px;
  display: flex;
  align-items: center;
  gap: 20px;
}

.section-title h2 {
  font-family: "Cinzel", serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .5em;
  color: var(--gold);
  opacity: .8;
  text-transform: uppercase;
  white-space: nowrap;
}

.section-title::after {
  content: "";
  flex: 1;
  height: 1px;
  background: var(--rule);
}

/* ── IMAGE GRID ─────────────────────── */
.grid-wrap {
  position: relative; z-index: 10;
  padding: 0 40px 48px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 16px;
}

/* ── IMAGE CARD ─────────────────────── */
.card {
  background: var(--card-bg);
  border: 1px solid var(--rule);
  cursor: pointer;
  transition: border-color .2s, transform .2s, box-shadow .2s;
  overflow: hidden;
  position: relative;
}

.card:hover {
  border-color: var(--gold-dim);
  transform: translateY(-3px);
  box-shadow: 0 8px 32px rgba(0,0,0,.4), 0 0 20px rgba(200,171,106,.06);
  background: var(--card-hover);
}

.card-img {
  width: 100%;
  aspect-ratio: 3/4;
  object-fit: cover;
  object-position: top;
  display: block;
  background: var(--bg3);
  transition: opacity .3s;
}

.card-img.landscape {
  aspect-ratio: 16/9;
  object-position: center;
}

.card-img.square {
  aspect-ratio: 1/1;
  object-position: center;
}

.card-info {
  padding: 12px 14px;
  border-top: 1px solid var(--rule);
}

.card-name {
  font-family: "Cinzel", serif;
  font-size: 10px;
  letter-spacing: .3em;
  color: var(--gold);
  opacity: .85;
  margin-bottom: 4px;
  text-transform: uppercase;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.card-tag {
  font-family: "EB Garamond", serif;
  font-style: italic;
  font-size: 12px;
  color: var(--text-dim);
}

.card-status {
  position: absolute;
  top: 10px; right: 10px;
  font-family: "Cinzel", serif;
  font-size: 7px;
  letter-spacing: .3em;
  padding: 3px 8px;
  background: rgba(7,7,15,.85);
  border: 1px solid var(--gold-dim);
  color: var(--gold);
  opacity: .8;
}

/* ── LIGHTBOX ───────────────────────── */
#lightbox {
  position: fixed; inset: 0;
  background: rgba(4,4,10,.92);
  backdrop-filter: blur(16px);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 40px;
}

#lightbox.open { display: flex; }

.lb-inner {
  position: relative;
  max-width: 90vw;
  max-height: 90vh;
  display: flex;
  gap: 32px;
  align-items: flex-start;
}

  max-width: 65vw;
  max-height: 85vh;
  object-fit: contain;
  border: 1px solid var(--rule);
  box-shadow: 0 0 80px rgba(0,0,0,.7);

.lb-meta {

  max-width: 280px;
  padding-top: 8px;

.lb-name {
  font-family: "Cinzel", serif;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: .2em;
  color: var(--gold);
  margin-bottom: 8px;

.lb-series {

  font-style: italic;
  font-size: 14px;
  color: var(--text-dim);

  border-bottom: 1px solid var(--rule);

.lb-notes {
  font-family: "EB Garamond", serif;
  font-size: 14px;
  color: var(--text);
  line-height: 1.75;

.lb-url {
  margin-top: 24px;
  padding-top: 20px;

.lb-url label {

  font-size: 8px;
  letter-spacing: .4em;
  color: var(--teal);

.lb-url-text:hover {

.lb-close {

  background: var(--bg2);
  border: 1px solid var(--rule);

  letter-spacing: .4em;

/* ── FOOTER ──────────────────────────── */
footer {

  text-align: center;
  padding: 32px 40px;
  border-top: 1px solid var(--rule);
  font-size: 11px;
  color: var(--text-dim);

/* ── LOADING STATE ───────────────────── */

  padding: 60px;

  font-size: 9px;
  letter-spacing: .5em;

/* ── RESPONSIVE ──────────────────────── */
@media (max-width: 600px) {
  .site-header { padding: 16px 20px; }

  .grid-wrap { padding: 0 20px 40px; }

  .lb-inner { flex-direction: column; }
  #lb-img { max-width: 85vw; }
  .lb-meta { min-width: unset; max-width: 100%; }
}

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let currentFilter = "all";
let currentSearch = "";

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
function buildImageUrl(path) {
  return IK_BASE + path;
}

function getFiltered() {
  return ASSETS.filter(a => {
    const cats = Array.isArray(a.cat) ? a.cat : [a.cat];
    const matchCat = currentFilter === "all" || cats.includes(currentFilter);
    const q = currentSearch.toLowerCase();
    const matchSearch = !q ||
      a.name.toLowerCase().includes(q) ||
      a.series.toLowerCase().includes(q) ||
      a.notes.toLowerCase().includes(q);
    return matchCat && matchSearch;
  });
}

function groupByCategory(assets) {
  const order = ["characters","nekojin","darkpack","cards","weapons","masks","environments","reference"];
  const groups = {};
  assets.forEach(a => {
    const cats = Array.isArray(a.cat) ? a.cat : [a.cat];
    const primaryCat = cats[0];
    if (!groups[primaryCat]) groups[primaryCat] = [];
    groups[primaryCat].push(a);
  });
  return order.filter(k => groups[k]).map(k => ({ key: k, items: groups[k] }));
}

const LABELS = {
  characters:   "Characters",
  nekojin:      "Nekojin",
  darkpack:     "DarkPack",
  cards:        "Collector Cards",
  weapons:      "Weapons",
  masks:        "Masks",
  environments: "Environments",
  reference:    "Reference",
};

function render() {
  const root = document.getElementById("gallery-root");
  const filtered = getFiltered();

  if (!filtered.length) {
    root.innerHTML = `<div class="upload-notice">
      <div class="icon">◇</div>
      <p>No assets found</p>
      <small>Upload images to ImageKit and add them to the manifest above</small>
    </div>`;
    return;
  }

  const groups = currentFilter === "all"
    ? groupByCategory(filtered)
    : [{ key: currentFilter, items: filtered }];

  root.innerHTML = groups.map(g => `
    <div class="section-title"><h2>${LABELS[g.key] || g.key}</h2></div>
    <div class="grid-wrap">
      <div class="grid">
        ${g.items.map((a, i) => `
          <div class="card" onclick="openLightbox(${ASSETS.indexOf(a)})">
            ${a.status ? `<div class="card-status">${a.status}</div>` : ""}
            <img
              class="card-img ${a.aspect === 'landscape' ? 'landscape' : a.aspect === 'square' ? 'square' : ''}"
              src="${buildImageUrl(a.path)}"
              alt="${a.name}"
              loading="lazy"
              onerror="this.style.opacity='.15';this.style.filter='grayscale(1)'"
            >
            <div class="card-info">
              <div class="card-name">${a.name}</div>
              <div class="card-tag">${a.series}</div>
            </div>
          </div>
        `).join("")}
      </div>
    </div>
  `).join("");
}

// ─────────────────────────────────────────────
// LIGHTBOX
// ─────────────────────────────────────────────
function openLightbox(idx) {
  const a = ASSETS[idx];
  const url = buildImageUrl(a.path);
  document.getElementById("lb-img").src = url;
  document.getElementById("lb-name").textContent = a.name;
  document.getElementById("lb-series").textContent = a.series;
  document.getElementById("lb-notes").textContent = a.notes;
  document.getElementById("lb-url-text").textContent = url;
  document.getElementById("lightbox").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeLightbox() {
  document.getElementById("lightbox").classList.remove("open");
  document.body.style.overflow = "";
  document.getElementById("lb-img").src = "";
}

function copyUrl(el) {
  navigator.clipboard.writeText(el.textContent).then(() => {
    const orig = el.textContent;
    el.textContent = "Copied!";
    setTimeout(() => el.textContent = orig, 1500);
  });
}

document.getElementById("lb-close").addEventListener("click", closeLightbox);
document.getElementById("lightbox").addEventListener("click", e => {
  if (e.target === document.getElementById("lightbox")) closeLightbox();
});
document.addEventListener("keydown", e => {
  if (e.key === "Escape") closeLightbox();
});

// ─────────────────────────────────────────────
// FILTERS + SEARCH
// ─────────────────────────────────────────────
document.querySelectorAll(".pill").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".pill").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentFilter = btn.dataset.filter;
    render();
  });
});

document.getElementById("search").addEventListener("input", e => {
  currentSearch = e.target.value;
  render();
});

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
render();
</script>
